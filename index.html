<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f9d8d7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="見面倒數" />
    <meta name="description" content="第一次見面倒數，從台南飛向上海，小笨蛋粽子飛向大笨蛋北七。" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>第一次見面倒數</title>
    <script>
      (() => {
        const chromeColors = {
          peach: '#fff7f2',
          mint: '#eaf7f7',
          night: '#111a2d'
        };
        try {
          const settings = JSON.parse(localStorage.getItem('first-meeting:settings') || '{}');
          const color = chromeColors[settings.theme] || chromeColors.peach;
          const themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', color);
          document.documentElement.style.setProperty('--app-page-background', color);
          document.documentElement.style.background = color;
          document.body?.style.setProperty('background', color);
        } catch {
          document.documentElement.style.setProperty('--app-page-background', chromeColors.peach);
          document.documentElement.style.background = chromeColors.peach;
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
