name: Deploy Cloud Run API

on:
  push:
    branches:
      - main
      - master
    paths:
      - cloud-api/**
      - .github/workflows/deploy-cloud-run.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.CLOUD_RUN_REGION }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          source: ./cloud-api
          flags: >-
            --allow-unauthenticated
            --set-env-vars=APP_PASSWORD=${{ secrets.APP_PASSWORD }},SESSION_SECRET=${{ secrets.CLOUD_RUN_SESSION_SECRET }},ALLOWED_ORIGIN=${{ vars.CLOUD_RUN_ALLOWED_ORIGIN }}
