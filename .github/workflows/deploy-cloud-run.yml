name: Deploy Cloud Run API

on:
  push:
    branches:
      - main
      - master
    paths:
      - cloud-api/**
      - .github/workflows/deploy-cloud-run.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_ID: erudite-bloom-249605
  REGION: asia-east1
  SERVICE: yorke-miss-hhh-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          source: ./cloud-api
          flags: >-
            --allow-unauthenticated
            --set-env-vars=APP_PASSWORD=19940710,SESSION_SECRET=${{ secrets.CLOUD_RUN_SESSION_SECRET }},ALLOWED_ORIGIN=https://tamyu321-source.github.io
